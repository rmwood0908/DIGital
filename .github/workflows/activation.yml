name: Acquire Unity Activation File

on:
  workflow_dispatch:

jobs:
  activation:
    name: Request Unity Activation File
    runs-on: ubuntu-latest
    steps:
      - name: Request Unity Activation File
        uses: game-ci/unity-activate@v2
        with:
          unityVersion: 6000.2.10f1

      - name: Upload Activation File
        uses: actions/upload-artifact@v4
        with:
          name: Unity_v6000.2.10f1.alf
          path: Unity_v6000.2.10f1.alf
